site_name: OpenDSC
site_url: https://opendsc.dev
site_description: Open-source configuration management built on Microsoft DSC v3
copyright: Copyright &copy; 2023-2026 Thomas Nieto

repo_name: opendsc/opendsc
repo_url: https://github.com/opendsc/opendsc

edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.action.edit
    - content.action.view
    - content.code.select
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.indexes
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - search
    - search.suggest
    - search.highlight

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/opendsc/opendsc
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

markdown_extensions:
  - abbr
  - admonition
  - def_list
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - git-revision-date-localized:
      enable_creation_date: true
  - search

  - git-committers:
      repository: opendsc/opendsc
      branch: main

exclude_docs: |
  pull-server/*

nav:
  - Home: index.md

  - Get started:
      - Resources: get-started/resources.md
      - LCM: get-started/lcm.md
      - Pull Server: get-started/pull-server.md

  - Concepts:
      - LCM:
          - concepts/lcm/index.md
      - Pull Server:
          - concepts/pull-server/index.md
          - Authentication: concepts/pull-server/authentication.md
          - Configuration Management: concepts/pull-server/configuration-management.md
          - Parameter Merging: concepts/pull-server/parameter-merging.md
          - Parameter Validation: concepts/pull-server/parameter-validation.md
          - Scope System: concepts/pull-server/scope-system.md
          - Versioning: concepts/pull-server/versioning.md
      - Resources:
          - concepts/resources/index.md
          - Operations: concepts/resources/operations.md

  - Guides:
      - Configure HTTPS: guides/configure-https.md
      - Manage Users & Roles: guides/manage-users-roles.md
      - Retention Policies: guides/retention-policies.md
      - Export Resources: guides/export-resources.md
      - Feature Flags: guides/feature-flags.md
      - Prerelease vs Feature Flags: guides/prerelease-vs-feature-flags.md

  - Reference:
      - API:
          - reference/api/index.md
          - Authentication: reference/api/authentication.md
          - Users: reference/api/users.md
          - Groups: reference/api/groups.md
          - Roles: reference/api/roles.md
          - Health: reference/api/health.md
          - Nodes: reference/api/nodes.md
          - Configurations: reference/api/configurations.md
          - Composite Configurations: reference/api/composite-configurations.md
          - Parameters: reference/api/parameters.md
          - Scope Types: reference/api/scope-types.md
          - Reports: reference/api/reports.md
          - Settings: reference/api/settings.md
          - Registration Keys: reference/api/registration-keys.md
          - Retention: reference/api/retention.md

      - Extensions:
          - reference/extensions/index.md
          - MOF:
              - Import: reference/extensions/mof-import.md

      - Resources:
          - reference/resources/index.md
          - Archive:
              - ZIP:
                  - Compress: reference/resources/archive/zip/compress.md
                  - Expand: reference/resources/archive/zip/expand.md
          - File System:
              - Directory: reference/resources/filesystem/directory.md
              - File: reference/resources/filesystem/file.md
              - Symbolic Link: reference/resources/filesystem/symbolic-link.md
          - JSON:
              - Value: reference/resources/json/value.md
          - POSIX:
              - File System:
                  - Permission: reference/resources/posix/filesystem/permission.md
          - SQL Server:
              - Agent Job: reference/resources/sqlserver/agent-job.md
              - Configuration: reference/resources/sqlserver/configuration.md
              - Database: reference/resources/sqlserver/database.md
              - Database Permission: reference/resources/sqlserver/database-permission.md
              - Database Role: reference/resources/sqlserver/database-role.md
              - Database User: reference/resources/sqlserver/database-user.md
              - Linked Server: reference/resources/sqlserver/linked-server.md
              - Login: reference/resources/sqlserver/login.md
              - Object Permission: reference/resources/sqlserver/object-permission.md
              - Server Permission: reference/resources/sqlserver/server-permission.md
              - Server Role: reference/resources/sqlserver/server-role.md
          - Windows:
